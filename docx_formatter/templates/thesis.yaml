name: "毕业论文"
description: "中国高校毕业论文通用模板"
page:
  size: A4
  margins:
    top: 2.54cm
    bottom: 2.54cm
    left: 3.17cm
    right: 3.17cm
  header:
    content: "毕业论文"
    font_cn: "宋体"
    font_en: "Times New Roman"
    size: "小五"
  footer:
    content: ""
  page_number:
    position: bottom_center
    format: arabic
    start: 1
headings:
  level_1:
    font_cn: "黑体"
    font_en: "Times New Roman"
    size: "三号"
    bold: true
    align: center
    space_before: 24pt
    space_after: 18pt
  level_2:
    font_cn: "黑体"
    font_en: "Times New Roman"
    size: "小三"
    bold: true
    align: left
    space_before: 13pt
    space_after: 13pt
  level_3:
    font_cn: "黑体"
    font_en: "Times New Roman"
    size: "四号"
    bold: true
    align: left
    space_before: 13pt
    space_after: 13pt
body:
  font_cn: "宋体"
  font_en: "Times New Roman"
  size: "小四"
  first_line_indent: 24pt
  line_spacing: 1.5lines
  line_spacing_rule: multiple
  align: justify
  space_before: 0pt
  space_after: 0pt
formulas:
  font_cn: "宋体"
  font_en: "Times New Roman"
  size: "小四"
  align: center
  space_before: 6pt
  space_after: 6pt
  numbering: chapter
figures:
  caption_font_cn: "宋体"
  caption_font_en: "Times New Roman"
  caption_size: "五号"
  caption_bold: false
  figure_caption_position: below
  table_caption_position: above
  numbering: chapter
  table_style: three_line
numbering:
  strict_mode: true
  level_1:
    style: arabic_dot
    align: left
    first_line_indent: 0pt
    hanging_indent: 24pt
    font_cn: "宋体"
    font_en: "Times New Roman"
    size: "小四"
    line_spacing: 1.5lines
    space_before: 0pt
    space_after: 0pt
  level_2:
    style: paren_cn
    align: left
    first_line_indent: 0pt
    hanging_indent: 24pt
    font_cn: "宋体"
    font_en: "Times New Roman"
    size: "小四"
    line_spacing: 1.5lines
    space_before: 0pt
    space_after: 0pt
  bracket:
    style: bracket_arabic
    align: left
    first_line_indent: 0pt
    hanging_indent: 24pt
    font_cn: "宋体"
    font_en: "Times New Roman"
    size: "小四"
    line_spacing: 1.5lines
    space_before: 0pt
    space_after: 0pt
references:
  title: "参考文献"
  title_font_cn: "黑体"
  title_font_en: "Times New Roman"
  title_size: "小四"
  title_bold: true
  title_align: "left"
  font_cn: "宋体"
  font_en: "Times New Roman"
  size: "五号"
  align: "left"
  hanging_indent: "2chars"
  number_style: "bracket"
